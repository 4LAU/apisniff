name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Test
        run: go test ./... -count=1

  release:
    needs: test
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          # --parallelism 1 serializes the cross-compile. Five concurrent
          # builds each compiling the large chromedp/cdproto tree oversubscribe
          # the runner's memory and thrash until GitHub kills it ("lost
          # communication"). Building one target at a time keeps peak memory low.
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./... -v -count=1
      - name: Build
        run: go build ./cmd/apisniff

  govulncheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # Builds the full release in snapshot mode so cross-compile or packaging
  # breakage is caught here, not at tag time. Runs on PRs and on main pushes —
  # work merged straight to main (e.g. local --no-ff merges) is validated too.
  # --parallelism 1 mirrors the real release: serialized builds keep peak
  # memory low so the runner is not starved during the cdproto-heavy compile.
  # The cache below shares a key prefix with release.yml so this snapshot build
  # warms the real release's cross-compile cache.
  release-check:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-xbuild-linux-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-xbuild-linux-${{ hashFiles('go.sum') }}-
            go-xbuild-linux-
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --snapshot --clean --parallelism 1

version: 2
project_name: apisniff

builds:
  - main: ./cmd/apisniff
    binary: apisniff
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: apisniff
    repository:
      owner: 4LAU
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/4LAU/apisniff"
    description: "API recon: preflight defenses, traffic capture, and spec extraction"
    license: "MIT"
    test: |
      assert_match "Usage", shell_output("#{bin}/apisniff --help")

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

# Antibot JS markers — if 2+ are found in a JS file, the file is kept as antibot JS.
# From report.py _ANTIBOT_JS_MARKERS.

markers:
  # Browser automation detection
  - navigator.webdriver
  # Canvas fingerprinting
  - toDataURL
  # WebGL fingerprinting
  - WEBGL_debug_renderer_info
  # Akamai Bot Manager
  - _abck
  - sensor_data
  - bmak
  # Cloudflare
  - cf_chl_
  - chlApiSitekey
  # DataDome
  - ddjskey
  - dd.js
  # PerimeterX / HUMAN
  - _pxAppId
  # Kasada
  - kpsdk
  # Fingerprinting libraries
  - fingerprintjs
  - FingerprintJS
  - deviceFingerprint
  # Generic bot detection
  - challenge-platform
  - bot-detect
  - antibotcookie

# Allowlist domains — always kept, override all drop rules.
allowlist_domains:
  - awswaf.com
  - akstat.io
  - challenges.cloudflare.com
  - datadome.co
  - datado.me
  - shapesecurity.com
  - incapsula.com
  - impervadns.net
  - shieldsquare.com
  - shieldsquare.net
  - rdwr.io
  - geetest.com
  - geevisit.com
  - px-cloud.net
  - px-cdn.net
  - perimeterx.net
  - online-metrix.net
  - kasada.io
  - kpsdk.io
  - kpsdk.com
  - arkoselabs.com
  - funcaptcha.com
  - hcaptcha.com
  - drfdisvc.walmart.com

# Allowlist path fragments — always kept.
allowlist_paths:
  - /cdn-cgi/challenge-platform/
  - /cdn-cgi/turnstile/
  - /cdn-cgi/bm/
  - /waf-js-challenge/
  - /recaptcha/

# Path-based telemetry drops.
drop_path_substrings:
  - /~/csp-report
  - GenerateFavIcon
  - favicon.ico
  - /rum.gif
  - /rum.js
  - /beacon.gif
  - /pixel.gif
  - /tracking.gif
  - /1x1.gif
  - /tap.gif
  - /xoplatform/logger/api/logger
  - /track/pxl
  - /track/conv
  - /track/cei
  - /track/realtimeconversion
  - /pageview
  - /convVisitLib

# Same-site noise paths.
same_site_drop_paths:
  - pwabuilder-sw
  - /cdn-cgi/rum
  - /logging
  - /ee/or2/
  - /ee/v1/interact
